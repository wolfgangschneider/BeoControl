[platformio]
default_envs = m5stack-atom

; ── Shared settings ─────────────────────────────────────────────────
[common]
; pioarduino platform fork — Arduino-ESP32 3.1.3 / IDF5.3
; required by esp32_beo4 >= 1.5.0 (uses driver/rmt_tx.h from IDF5)
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
framework = arduino
monitor_filters = esp32_exception_decoder, log2file
monitor_speed   = 115200
upload_speed    = 921600
lib_deps = 
  https://github.com/aanban/esp32_beo4

; ── Generic ESP32 dev board ─────────────────────────────────────────
[env:esp32dev]
platform          = ${common.platform}
framework         = ${common.framework}
board             = esp32dev
monitor_filters   = ${common.monitor_filters}
monitor_speed     = ${common.monitor_speed}
upload_speed      = ${common.upload_speed}
lib_deps          =
  ${common.lib_deps}
  h2zero/NimBLE-Arduino @ ^1.4
build_flags = 
  ;-DBOARD_HAS_PSRAM
  ;-mfix-esp32-psram-cache-issue
  ;-DCORE_DEBUG_LEVEL=5

; ── M5 Atom S3 (ESP32-S3, USB-CDC, with display) ─────────────────────
[env:m5atoms3]
platform          = ${common.platform}
framework         = ${common.framework}
board             = m5stack-atoms3
monitor_filters   = ${common.monitor_filters}
monitor_speed     = ${common.monitor_speed}
lib_deps        = 
  ${common.lib_deps}
  h2zero/NimBLE-Arduino @ ^1.4

; To enter ROM download mode for upload:
;   hold front button → press+release RST → release front button
upload_protocol = esptool
upload_speed    = 921600
build_flags = 
  -DBOARD_M5ATOMS3
  -DARDUINO_USB_CDC_ON_BOOT=1

; ── M5 Stamp S3 (ESP32-S3, USB-CDC, BLE NUS) ────────────────────────
[env:m5stamps3]
platform          = ${common.platform}
framework         = ${common.framework}
board             = m5stack-stamps3
monitor_filters   = ${common.monitor_filters}
monitor_speed     = ${common.monitor_speed}
lib_deps        =
  ${common.lib_deps}
  h2zero/NimBLE-Arduino @ ^1.4

; To enter ROM download mode: hold G0 (boot) → press+release RST → release G0
upload_protocol = esptool
upload_speed    = 921600
build_flags =
  -DBOARD_M5STAMPS3
  -DARDUINO_USB_CDC_ON_BOOT=1

; ── M5 Atom (ESP32, USB-CDC, with display) ─────────────────────────
[env:m5stack-atom]
platform          = ${common.platform}
framework         = ${common.framework}
board             = m5stack-atom
monitor_filters   = ${common.monitor_filters}
monitor_speed     = ${common.monitor_speed}
upload_speed = 115200
lib_deps        =
  ${common.lib_deps}
  h2zero/NimBLE-Arduino @ ^1.4
build_flags =
  -DBOARD_M5STACK_ATOM

  ; ── M5 Stamp C3 (ESP32‑C3, USB‑CDC) ────────────────────────────────
  ; will not work with esp32_beo4




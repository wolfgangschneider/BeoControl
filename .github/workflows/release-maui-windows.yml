name: Release MAUI Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update (example: v1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark the release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  PROJECT_PATH: UI\BeoControlBlazor\BeoControlMaui\BeoControlMaui.csproj
  WEBKIT_PROJECT_PATH: UI\BeoControlBlazor\BeoControlWebKit\BeoControlWebKit\BeoControlWebKit.csproj
  TARGET_FRAMEWORK: net10.0-windows10.0.19041.0
  CONFIGURATION: Release
  VELOPACK_VERSION: 0.0.1298

jobs:
  prepare-release:
    name: Prepare GitHub release
    runs-on: windows-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $tag = '${{ inputs.tag }}'
            $prerelease = '${{ inputs.prerelease }}'
          }
          else {
            $tag = '${{ github.ref_name }}'
            $prerelease = if ($tag -match '-') { 'true' } else { 'false' }
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw 'Release tag is required.'
          }

          if ($tag -match '^[vV](.+)$') {
            $version = $Matches[1]
          }
          else {
            $version = $tag
          }

          "release_tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "release_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ steps.meta.outputs.release_tag }}'
          $isPrerelease = '${{ steps.meta.outputs.prerelease }}' -eq 'true'

          gh release view $tag | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag already exists."
            exit 0
          }

          $args = @('release', 'create', $tag, '--title', $tag, '--generate-notes', '--target', '${{ github.sha }}')
          if ($isPrerelease) {
            $args += '--prerelease'
          }

          gh @args

  publish-velopack-maui:
    name: Publish Velopack MAUI ${{ matrix.runtime }} (${{ matrix.package_mode }})
    needs: prepare-release
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: win-x64
            self_contained: "true"
            package_mode: self-contained
            channel: win-x64-self-contained
          - runtime: win-x64
            self_contained: "false"
            package_mode: framework-dependent
            channel: win-x64-framework-dependent
          - runtime: win-arm64
            self_contained: "true"
            package_mode: self-contained
            channel: win-arm64-self-contained
          - runtime: win-arm64
            self_contained: "false"
            package_mode: framework-dependent
            channel: win-arm64-framework-dependent
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI Windows workload
        run: dotnet workload install maui-windows

      - name: Install vpk
        shell: pwsh
        run: |
          dotnet tool install --global vpk --version $env:VELOPACK_VERSION
          $toolPath = Join-Path $HOME ".dotnet\tools"
          $toolPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Publish MAUI Windows app for Velopack
        shell: pwsh
        run: |
          $runtime = '${{ matrix.runtime }}'
          $packageMode = '${{ matrix.package_mode }}'
          $publishDir = Join-Path $env:RUNNER_TEMP "publish\velopack\maui\$runtime\$packageMode"

          dotnet publish $env:PROJECT_PATH `
            -c $env:CONFIGURATION `
            -f $env:TARGET_FRAMEWORK `
            -r $runtime `
            --self-contained ${{ matrix.self_contained }} `
            -p:Version=${{ needs.prepare-release.outputs.release_version }} `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=${{ matrix.self_contained }} `
            -p:WindowsAppSdkSelfContained=${{ matrix.self_contained }} `
            -p:PublishTrimmed=false `
            -o $publishDir

      - name: Pack MAUI Windows with Velopack
        shell: pwsh
        run: |
          $runtime = '${{ matrix.runtime }}'
          $packageMode = '${{ matrix.package_mode }}'
          $publishDir = Join-Path $env:RUNNER_TEMP "publish\velopack\maui\$runtime\$packageMode"
          $releaseDir = Join-Path $env:RUNNER_TEMP "releases\velopack-maui-$runtime-$packageMode"
          $channel = '${{ matrix.channel }}'

          & vpk pack `
            --packId wolfgangschneider.BeoControlMaui `
            --packVersion "${{ needs.prepare-release.outputs.release_version }}" `
            --packDir $publishDir `
            --mainExe BeoControlMaui.exe `
            --packAuthors "wolfgangschneider" `
            --packTitle "BeoControlMaui" `
            --channel $channel `
            --runtime $runtime `
            --outputDir $releaseDir

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Normalize MAUI download file names
        shell: pwsh
        run: |
          $runtime = '${{ matrix.runtime }}'
          $packageMode = '${{ matrix.package_mode }}'
          $channel = '${{ matrix.channel }}'
          $releaseDir = Join-Path $env:RUNNER_TEMP "releases\velopack-maui-$runtime-$packageMode"
          $oldSetupName = "wolfgangschneider.BeoControlMaui-$channel-Setup.exe"
          $newSetupName = "BeoControlMaui-$runtime-$packageMode-Setup.exe"
          $oldSetupPath = Join-Path $releaseDir $oldSetupName
          $newSetupPath = Join-Path $releaseDir $newSetupName

          if (Test-Path $oldSetupPath) {
            Move-Item -Path $oldSetupPath -Destination $newSetupPath -Force
          }

          Get-ChildItem -Path $releaseDir -Filter "assets*.json" | ForEach-Object {
            $content = Get-Content -Path $_.FullName -Raw
            $updated = $content.Replace($oldSetupName, $newSetupName)
            Set-Content -Path $_.FullName -Value $updated -NoNewline
          }

      - name: Upload Velopack workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: velopack-maui-${{ matrix.runtime }}-${{ matrix.package_mode }}
          path: ${{ runner.temp }}\releases\velopack-maui-${{ matrix.runtime }}-${{ matrix.package_mode }}
          if-no-files-found: error

      - name: Upload Velopack assets to GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $runtime = '${{ matrix.runtime }}'
          $packageMode = '${{ matrix.package_mode }}'
          $releaseDir = Join-Path $env:RUNNER_TEMP "releases\velopack-maui-$runtime-$packageMode"
          Get-ChildItem -Path $releaseDir -File | ForEach-Object {
            gh release upload '${{ needs.prepare-release.outputs.release_tag }}' $_.FullName --clobber
          }

  publish-velopack-webkit:
    name: Publish Velopack WebKit ${{ matrix.runtime }}
    needs: prepare-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - linux-x64
          - linux-arm64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install vpk
        shell: pwsh
        run: |
          dotnet tool install --global vpk --version $env:VELOPACK_VERSION
          $toolPath = Join-Path $HOME ".dotnet/tools"
          $toolPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Publish BeoControlWebKit for Velopack
        shell: pwsh
        run: |
          $runtime = '${{ matrix.runtime }}'
          $publishDir = Join-Path $env:RUNNER_TEMP "publish/velopack/webkit/$runtime"

          dotnet publish $env:WEBKIT_PROJECT_PATH `
            -c $env:CONFIGURATION `
            -r $runtime `
            --self-contained true `
            -p:Version=${{ needs.prepare-release.outputs.release_version }} `
            -o $publishDir

      - name: Pack BeoControlWebKit with Velopack
        shell: pwsh
        run: |
          $runtime = '${{ matrix.runtime }}'
          $publishDir = Join-Path $env:RUNNER_TEMP "publish/velopack/webkit/$runtime"
          $releaseDir = Join-Path $env:RUNNER_TEMP "releases/velopack-webkit-$runtime"

          vpk pack `
            --packId wolfgangschneider.BeoControlWebKit `
            --packVersion "${{ needs.prepare-release.outputs.release_version }}" `
            --packDir $publishDir `
            --mainExe BeoControlWebKit `
            --packAuthors "wolfgangschneider" `
            --packTitle "BeoControlWebKit" `
            --channel $runtime `
            --runtime $runtime `
            --outputDir $releaseDir

      - name: Normalize WebKit download file names
        shell: pwsh
        run: |
          $runtime = '${{ matrix.runtime }}'
          $releaseDir = Join-Path $env:RUNNER_TEMP "releases/velopack-webkit-$runtime"
          $oldAppImageName = "wolfgangschneider.BeoControlWebKit-$runtime.AppImage"
          $newAppImageName = "BeoControlWebKit-$runtime.AppImage"
          $oldAppImagePath = Join-Path $releaseDir $oldAppImageName
          $newAppImagePath = Join-Path $releaseDir $newAppImageName

          if (Test-Path $oldAppImagePath) {
            Move-Item -Path $oldAppImagePath -Destination $newAppImagePath -Force
          }

          Get-ChildItem -Path $releaseDir -Filter "assets*.json" | ForEach-Object {
            $content = Get-Content -Path $_.FullName -Raw
            $updated = $content.Replace($oldAppImageName, $newAppImageName)
            Set-Content -Path $_.FullName -Value $updated -NoNewline
          }

      - name: Upload Velopack workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: velopack-webkit-${{ matrix.runtime }}
          path: ${{ runner.temp }}/releases/velopack-webkit-${{ matrix.runtime }}
          if-no-files-found: error

      - name: Upload Velopack assets to GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $runtime = '${{ matrix.runtime }}'
          $releaseDir = Join-Path $env:RUNNER_TEMP "releases/velopack-webkit-$runtime"
          Get-ChildItem -Path $releaseDir -File | ForEach-Object {
            gh release upload '${{ needs.prepare-release.outputs.release_tag }}' $_.FullName --clobber
          }

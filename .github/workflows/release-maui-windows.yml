name: Release MAUI Windows

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create or update (example: v1.0.0)"
        required: true
        type: string
      prerelease:
        description: "Mark the release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  PROJECT_PATH: UI\BeoControlBlazor\BeoControlMaui\BeoControlMaui.csproj
  WEBKIT_PROJECT_PATH: UI\BeoControlBlazor\BeoControlWebKit\BeoControlWebKit\BeoControlWebKit.csproj
  TARGET_FRAMEWORK: net10.0-windows10.0.19041.0
  ANDROID_TARGET_FRAMEWORK: net10.0-android
  CONFIGURATION: Release
  VELOPACK_VERSION: 0.0.1298
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-release:
    name: Prepare GitHub release
    runs-on: windows-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_version: ${{ steps.meta.outputs.release_version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $tag = '${{ inputs.tag }}'
            $prerelease = '${{ inputs.prerelease }}'
          }
          else {
            $tag = '${{ github.ref_name }}'
            $prerelease = if ($tag -match '-') { 'true' } else { 'false' }
          }

          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw 'Release tag is required.'
          }

          if ($tag -match '^[vV](.+)$') {
            $version = $Matches[1]
          }
          else {
            $version = $tag
          }

          "release_tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "release_version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prerelease=$prerelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Create or update GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ steps.meta.outputs.release_tag }}'
          $isPrerelease = '${{ steps.meta.outputs.prerelease }}' -eq 'true'

          gh release view $tag | Out-Null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag already exists."
            exit 0
          }

          $args = @('release', 'create', $tag, '--title', $tag, '--generate-notes', '--target', '${{ github.sha }}')
          if ($isPrerelease) {
            $args += '--prerelease'
          }

          gh @args

  publish-velopack-maui:
    name: Publish Velopack MAUI ${{ matrix.runtime }} (${{ matrix.package_mode }})
    needs: prepare-release
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: win-x64
            self_contained: "true"
            package_mode: self-contained
            channel: win-x64-self-contained
          - runtime: win-x64
            self_contained: "false"
            package_mode: framework-dependent
            channel: win-x64-framework-dependent
          - runtime: win-arm64
            self_contained: "true"
            package_mode: self-contained
            channel: win-arm64-self-contained
          - runtime: win-arm64
            self_contained: "false"
            package_mode: framework-dependent
            channel: win-arm64-framework-dependent
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI Windows workload
        run: dotnet workload install maui-windows

      - name: Install vpk
        shell: pwsh
        run: |
          dotnet tool install --global vpk --version $env:VELOPACK_VERSION
          $toolPath = Join-Path $HOME ".dotnet\tools"
          $toolPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Publish MAUI Windows app for Velopack
        shell: pwsh
        run: |
          $runtime = '${{ matrix.runtime }}'
          $packageMode = '${{ matrix.package_mode }}'
          $publishDir = Join-Path $env:RUNNER_TEMP "publish\velopack\maui\$runtime\$packageMode"

          dotnet publish $env:PROJECT_PATH `
            -c $env:CONFIGURATION `
            -f $env:TARGET_FRAMEWORK `
            -r $runtime `
            --self-contained ${{ matrix.self_contained }} `
            -p:Version=${{ needs.prepare-release.outputs.release_version }} `
            -p:WindowsPackageType=None `
            -p:WindowsAppSDKSelfContained=${{ matrix.self_contained }} `
            -p:WindowsAppSdkSelfContained=${{ matrix.self_contained }} `
            -p:PublishTrimmed=false `
            -o $publishDir

      - name: Pack MAUI Windows with Velopack
        shell: pwsh
        run: |
          $runtime = '${{ matrix.runtime }}'
          $packageMode = '${{ matrix.package_mode }}'
          $publishDir = Join-Path $env:RUNNER_TEMP "publish\velopack\maui\$runtime\$packageMode"
          $releaseDir = Join-Path $env:RUNNER_TEMP "releases\velopack-maui-$runtime-$packageMode"
          $channel = '${{ matrix.channel }}'

          & vpk pack `
            --packId BeoControl `
            --packVersion "${{ needs.prepare-release.outputs.release_version }}" `
            --packDir $publishDir `
            --mainExe BeoControlMaui.exe `
            --packAuthors "wolfgangschneider" `
            --packTitle "BeoControlMaui" `
            --channel $channel `
            --runtime $runtime `
            --outputDir $releaseDir

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Remove legacy Velopack feed
        shell: pwsh
        run: |
          $runtime = '${{ matrix.runtime }}'
          $packageMode = '${{ matrix.package_mode }}'
          $releaseDir = Join-Path $env:RUNNER_TEMP "releases\velopack-maui-$runtime-$packageMode"
          Get-ChildItem -Path $releaseDir -File -Filter "RELEASES*" | Remove-Item -Force

      - name: Upload Velopack workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: velopack-maui-${{ matrix.runtime }}-${{ matrix.package_mode }}
          path: ${{ runner.temp }}\releases\velopack-maui-${{ matrix.runtime }}-${{ matrix.package_mode }}
          if-no-files-found: error

      - name: Upload Velopack assets to GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $runtime = '${{ matrix.runtime }}'
          $packageMode = '${{ matrix.package_mode }}'
          $releaseDir = Join-Path $env:RUNNER_TEMP "releases\velopack-maui-$runtime-$packageMode"
          Get-ChildItem -Path $releaseDir -File -Filter "*-Setup.exe" | ForEach-Object {
            gh release upload '${{ needs.prepare-release.outputs.release_tag }}' $_.FullName --clobber
          }

  publish-velopack-webkit:
    name: Publish Velopack WebKit ${{ matrix.runtime }} (${{ matrix.package_mode }})
    needs: prepare-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: linux-x64
            self_contained: "true"
            package_mode: self-contained
            channel: linux-x64-self-contained
          - runtime: linux-x64
            self_contained: "false"
            package_mode: framework-dependent
            channel: linux-x64-framework-dependent
          - runtime: linux-arm64
            self_contained: "true"
            package_mode: self-contained
            channel: linux-arm64-self-contained
          - runtime: linux-arm64
            self_contained: "false"
            package_mode: framework-dependent
            channel: linux-arm64-framework-dependent
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install vpk
        shell: pwsh
        run: |
          dotnet tool install --global vpk --version $env:VELOPACK_VERSION
          $toolPath = Join-Path $HOME ".dotnet/tools"
          $toolPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Publish BeoControlWebKit for Velopack
        shell: pwsh
        run: |
          $runtime = '${{ matrix.runtime }}'
          $packageMode = '${{ matrix.package_mode }}'
          $publishDir = Join-Path $env:RUNNER_TEMP "publish/velopack/webkit/$runtime/$packageMode"

          dotnet publish $env:WEBKIT_PROJECT_PATH `
            -c $env:CONFIGURATION `
            -r $runtime `
            --self-contained ${{ matrix.self_contained }} `
            -p:Version=${{ needs.prepare-release.outputs.release_version }} `
            -o $publishDir

      - name: Pack BeoControlWebKit with Velopack
        shell: pwsh
        run: |
          $runtime = '${{ matrix.runtime }}'
          $packageMode = '${{ matrix.package_mode }}'
          $channel = '${{ matrix.channel }}'
          $publishDir = Join-Path $env:RUNNER_TEMP "publish/velopack/webkit/$runtime/$packageMode"
          $releaseDir = Join-Path $env:RUNNER_TEMP "releases/velopack-webkit-$runtime-$packageMode"

          vpk pack `
            --packId BeoControl `
            --packVersion "${{ needs.prepare-release.outputs.release_version }}" `
            --packDir $publishDir `
            --mainExe BeoControlWebKit `
            --packAuthors "wolfgangschneider" `
            --packTitle "BeoControlWebKit" `
            --channel $channel `
            --runtime $runtime `
            --outputDir $releaseDir

      - name: Remove legacy Velopack feed
        shell: pwsh
        run: |
          $runtime = '${{ matrix.runtime }}'
          $packageMode = '${{ matrix.package_mode }}'
          $releaseDir = Join-Path $env:RUNNER_TEMP "releases/velopack-webkit-$runtime-$packageMode"
          Get-ChildItem -Path $releaseDir -File -Filter "RELEASES*" | Remove-Item -Force

      - name: Upload Velopack workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: velopack-webkit-${{ matrix.runtime }}-${{ matrix.package_mode }}
          path: ${{ runner.temp }}/releases/velopack-webkit-${{ matrix.runtime }}-${{ matrix.package_mode }}
          if-no-files-found: error

      - name: Upload Velopack assets to GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $runtime = '${{ matrix.runtime }}'
          $packageMode = '${{ matrix.package_mode }}'
          $releaseDir = Join-Path $env:RUNNER_TEMP "releases/velopack-webkit-$runtime-$packageMode"
          Get-ChildItem -Path $releaseDir -File -Filter "*.AppImage" | ForEach-Object {
            gh release upload '${{ needs.prepare-release.outputs.release_tag }}' $_.FullName --clobber
          }

  publish-android-apk:
    name: Publish Android APK
    needs: prepare-release
    runs-on: windows-latest
    env:
      HAS_ANDROID_SIGNING: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_SIGNING_KEY_ALIAS != '' && secrets.ANDROID_SIGNING_KEY_PASS != '' && secrets.ANDROID_SIGNING_STORE_PASS != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Restore Android signing keystore
        if: ${{ env.HAS_ANDROID_SIGNING == 'true' }}
        shell: pwsh
        run: |
          $keystorePath = Join-Path $env:RUNNER_TEMP "android-release.keystore"
          [IO.File]::WriteAllBytes($keystorePath, [Convert]::FromBase64String('${{ secrets.ANDROID_KEYSTORE_BASE64 }}'))
          "ANDROID_KEYSTORE_PATH=$keystorePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Publish MAUI Android APK
        shell: pwsh
        env:
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASS: ${{ secrets.ANDROID_SIGNING_KEY_PASS }}
          ANDROID_SIGNING_STORE_PASS: ${{ secrets.ANDROID_SIGNING_STORE_PASS }}
        run: |
          $publishDir = Join-Path $env:RUNNER_TEMP "publish\android"
          $releaseDir = Join-Path $env:RUNNER_TEMP "releases\android"

          $publishArgs = @(
            'publish',
            $env:PROJECT_PATH,
            '-c', $env:CONFIGURATION,
            '-f', $env:ANDROID_TARGET_FRAMEWORK,
            '-p:Version=${{ needs.prepare-release.outputs.release_version }}',
            '-p:AndroidPackageFormats=apk',
            '-p:AndroidCreatePackagePerAbi=false',
            '-p:RunAOTCompilation=false',
            '-p:PublishTrimmed=false',
            '-o', $publishDir
          )

          if ($env:HAS_ANDROID_SIGNING -eq 'true') {
            $publishArgs += @(
              '-p:AndroidKeyStore=true',
              "-p:AndroidSigningKeyStore=$env:ANDROID_KEYSTORE_PATH",
              "-p:AndroidSigningKeyAlias=$env:ANDROID_SIGNING_KEY_ALIAS",
              '-p:AndroidSigningKeyPass=env:ANDROID_SIGNING_KEY_PASS',
              '-p:AndroidSigningStorePass=env:ANDROID_SIGNING_STORE_PASS'
            )
          }

          dotnet @publishArgs

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          $apk = Get-ChildItem -Path $publishDir -Recurse -File -Filter '*-Signed.apk' | Select-Object -First 1

          if ($null -eq $apk) {
            throw "Android APK not found in '$publishDir'."
          }

          $apkName = if ($env:HAS_ANDROID_SIGNING -eq 'true') { 'BeoControl-android.apk' } else { 'BeoControl-android-debug.apk' }
          Copy-Item -Path $apk.FullName -Destination (Join-Path $releaseDir $apkName)

      - name: Upload Android APK workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ${{ runner.temp }}\releases\android\*.apk
          if-no-files-found: error

      - name: Upload Android APK to GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          Get-ChildItem -Path (Join-Path $env:RUNNER_TEMP "releases\android") -File -Filter "*.apk" | ForEach-Object {
            gh release upload '${{ needs.prepare-release.outputs.release_tag }}' $_.FullName --clobber
          }

  build-pages-feed:
    name: Build Pages feed
    needs:
      - prepare-release
      - publish-velopack-maui
      - publish-velopack-webkit
    runs-on: ubuntu-latest
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download Velopack artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: velopack-*
          path: site/updates
          merge-multiple: true

      - name: Keep update feed files only
        shell: bash
        run: |
          find site/updates -maxdepth 1 -type f ! \( -name '*.nupkg' -o -name 'releases.*.json' -o -name 'assets.*.json' \) -delete

      - name: Generate Velopack release feeds
        shell: bash
        run: |
          python - <<'PY'
          import glob
          import hashlib
          import json
          import os
          import re

          updates_dir = os.path.join("site", "updates")
          package_pattern = re.compile(
              r"^(?P<package>.+)-(?P<version>\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?)-(?P<channel>.+)-(?P<type>full|delta)\.nupkg$",
              re.IGNORECASE,
          )

          for release_path in glob.glob(os.path.join(updates_dir, "releases.*.json")):
              os.remove(release_path)

          package_paths = sorted(glob.glob(os.path.join(updates_dir, "*.nupkg")))
          if not package_paths:
              raise SystemExit("No Velopack packages found in site/updates.")

          channels = {}
          for package_path in package_paths:
              file_name = os.path.basename(package_path)
              match = package_pattern.match(file_name)
              if not match:
                  raise SystemExit(f"Unsupported Velopack package name: {file_name}")

              with open(package_path, "rb") as package_file:
                  sha1 = hashlib.sha1(package_file.read()).hexdigest().upper()

              channel = match.group("channel")
              channels.setdefault(channel, []).append({
                  "PackageId": match.group("package"),
                  "Version": match.group("version"),
                  "Type": match.group("type").capitalize(),
                  "FileName": file_name,
                  "SHA1": sha1,
                  "Size": os.path.getsize(package_path),
              })

          for channel, release_assets in channels.items():
              release_path = os.path.join(updates_dir, f"releases.{channel}.json")
              with open(release_path, "w", encoding="utf-8") as handle:
                  json.dump({"Assets": release_assets}, handle, separators=(",", ":"))
          PY

          cat > site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>BeoControl Updates</title>
          </head>
          <body>
            <p>BeoControl Velopack update feed.</p>
          </body>
          </html>
          EOF
          cat > site/updates/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>BeoControl Updates</title>
          </head>
          <body>
            <p>BeoControl Velopack update feed.</p>
          </body>
          </html>
          EOF
          touch site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-pages-feed:
    name: Deploy Pages feed
    needs: build-pages-feed
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
